# Tells Grafana where to load dashboards from (provisioning from JSON files).
apiVersion: 1

providers:
  - name: Churn Dashboards
    orgId: 1
    folder: "Churn MLOps"
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true
    options:
      # Directory inside the container (see the volume in docker-compose.yml).
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false
