# Prometheus configuration for the churn demo.
# Scrapes metrics from the FastAPI service /metrics endpoint.
global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  # Prometheus itself (UI on host: http://localhost:17190; :9090 in the container).
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Churn model service. The "app" hostname comes from docker-compose (network).
  - job_name: churn-app
    metrics_path: /metrics
    static_configs:
      - targets: ["app:17100"]
        labels:
          service: churn-model
