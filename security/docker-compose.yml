# m10 — HashiCorp Vault (dev mode) for the churn demo. LOCAL/learning use ONLY.
# Dev mode: in-memory data, auto-unseal, known root token. Never in production!
#   docker compose -f security/docker-compose.yml up -d   (or: make vault-up)
services:
  vault:
    image: hashicorp/vault:1.18
    container_name: churn-vault
    cap_add:
      - IPC_LOCK
    ports:
      - "17200:17200"
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-only-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:17200
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:17200/v1/sys/health"]
      interval: 5s
      timeout: 3s
      retries: 10
